<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sip City Liquor Store</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; text-align: center; }
    header { padding: 20px; }
    .logo { max-width: 200px; }
    .hours, .contact { margin: 20px; }
    button { padding: 10px 20px; margin: 10px; font-size: 16px; }
  </style>
</head>
<body>
  <header>
    <img src="your-logo-image.jpg" alt="Sip City Logo" class="logo">
    <h1>Sip City Liquor Store</h1>
  </header>
  <section class="hours">
    <h2>Hours</h2>
    <p>Monday-Wednesday: 9:00 AM – 11:00 PM</p>
    <p>Thursday: 9:00 AM – 12:00 AM</p>
    <p>Friday-Saturday: 9:00 AM – 1:00 AM</p>
    <p>Sunday: 10:00 AM – 11:00 PM</p>
  </section>
  <section class="contact">
    <p>Call us: 313-532-0066</p>
    <button onclick="window.open('sip-city-menu-popup.png', '_blank')">View Menu</button>
    <button onclick="window.location='tel:3135320066'">Order Now</button>
  </section>
</body>
</html>
